services:
  entry-discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: entry-discord-bot:${IMAGE_TAG:-latest}
    container_name: entry-discord-bot
    environment:
      DATA_DIR: /app/data
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Seoul}

      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID}
      DISCORD_NOTION_CHANNEL_ID: ${DISCORD_NOTION_CHANNEL_ID:-}
      DISCORD_GITHUB_CHANNEL_ID: ${DISCORD_GITHUB_CHANNEL_ID:-}
      DISCORD_MENTION_ON_NOTION: ${DISCORD_MENTION_ON_NOTION:-}
      DISCORD_MENTION_ON_GITHUB: ${DISCORD_MENTION_ON_GITHUB:-}
      DISCORD_NOTION_ASSIGNEE_MENTIONS_JSON: ${DISCORD_NOTION_ASSIGNEE_MENTIONS_JSON:-{}}
      DISCORD_GITHUB_REVIEWER_MENTIONS_JSON: ${DISCORD_GITHUB_REVIEWER_MENTIONS_JSON:-{}}
      DISCORD_NOTIFY_ERRORS: ${DISCORD_NOTIFY_ERRORS:-true}

      NOTION_TOKEN: ${NOTION_TOKEN:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
      NOTION_POLL_INTERVAL_MS: ${NOTION_POLL_INTERVAL_MS:-60000}
      NOTION_NOTIFY_EXISTING_ON_START: ${NOTION_NOTIFY_EXISTING_ON_START:-false}
      NOTION_NOTIFY_REMOVED: ${NOTION_NOTIFY_REMOVED:-false}
      NOTION_TITLE_PROPERTY: ${NOTION_TITLE_PROPERTY:-}
      NOTION_STATUS_PROPERTY: ${NOTION_STATUS_PROPERTY:-}
      NOTION_ASSIGNEE_PROPERTY: ${NOTION_ASSIGNEE_PROPERTY:-}
      NOTION_DUE_DATE_PROPERTY: ${NOTION_DUE_DATE_PROPERTY:-}
      NOTION_PRIORITY_PROPERTY: ${NOTION_PRIORITY_PROPERTY:-}
      NOTION_QUERY_FILTER_JSON: ${NOTION_QUERY_FILTER_JSON:-}
      NOTION_QUERY_SORTS_JSON: ${NOTION_QUERY_SORTS_JSON:-}

      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOSITORIES: ${GITHUB_REPOSITORIES:-}
      GITHUB_POLL_INTERVAL_MS: ${GITHUB_POLL_INTERVAL_MS:-60000}
      GITHUB_NOTIFY_EXISTING_ON_START: ${GITHUB_NOTIFY_EXISTING_ON_START:-false}
      GITHUB_NOTIFY_PR_UPDATES: ${GITHUB_NOTIFY_PR_UPDATES:-true}
      GITHUB_PER_PAGE: ${GITHUB_PER_PAGE:-50}
    volumes:
      - entry-discord-bot-data:/app/data
    restart: unless-stopped

volumes:
  entry-discord-bot-data:
